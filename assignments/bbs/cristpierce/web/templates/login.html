{% extends "base.html" %}
{% block title %}BBS — Login{% endblock %}

{% block content %}
<div class="login-container">
  <div class="login-logo">BBS<span>://</span>Bustin'</div>
  <div class="login-subtitle">enter your handle to connect</div>

  <div class="card" style="text-align:left">
    <form action="/login" method="post">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="your_handle" required autofocus
               maxlength="30" pattern="[a-zA-Z0-9_-]+" title="Letters, numbers, hyphens, underscores only">
      </div>
      <button type="submit" class="btn" style="width:100%">Connect</button>
    </form>
    <div class="mt-1" style="text-align:center">
      <span class="text-dim mono" style="font-size:0.7rem">No password needed &mdash; just like the real BBSes</span>
    </div>
  </div>

  <div class="mt-2 ascii-art" style="text-align:center;font-size:0.6rem">
  ____  ____  ____
 | __ )| __ )/ ___|
 |  _ \|  _ \\___ \
 | |_) | |_) |___) |
 |____/|____/|____/
  </div>
</div>
{% endblock %}
